<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Interviewer Guide | All-In-One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .active-tag { background-color: #2563eb !important; color: white !important; }
        .details-hidden { display: none; }
        .card-enter { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-slate-300 p-6 sticky top-0 h-screen overflow-y-auto hidden lg:block">
        <div class="mb-8">
            <a href="index.html" class="text-blue-400 font-bold hover:text-white transition-all text-sm uppercase">← Dashboard</a>
        </div>
        <div class="mb-10 font-black text-2xl tracking-tighter text-white">AWS <span class="text-blue-500">HIRE</span></div>
        
        <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Interview Domains</h2>
        <nav class="space-y-2" id="tagList">
            <button onclick="filterTag('all')" class="active-tag w-full text-left px-4 py-2 rounded-xl text-sm font-bold transition-all">All Scenarios</button>
            <button onclick="filterTag('Storage')" class="w-full text-left px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-800 transition-all">S3 / Storage</button>
            <button onclick="filterTag('Database')" class="w-full text-left px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-800 transition-all">Databases</button>
            <button onclick="filterTag('Network')" class="w-full text-left px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-800 transition-all">Networking</button>
            <button onclick="filterTag('Security')" class="w-full text-left px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-800 transition-all">Security / IAM</button>
            <button onclick="filterTag('Compute')" class="w-full text-left px-4 py-2 rounded-xl text-sm font-bold hover:bg-slate-800 transition-all">EC2 / Lambda</button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-12">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Interviewer <span class="text-blue-600">Script</span></h1>
                <p class="text-slate-500 font-medium italic mt-2 text-lg">Lead the conversation. Score the candidate.</p>
            </div>
            <div id="stats" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full font-black text-xs uppercase tracking-widest">
                Scenarios: 50
            </div>
        </header>

        <div class="relative mb-10">
            <input type="text" id="searchInput" onkeyup="searchContent()" 
                placeholder="Find a specific service or problem (e.g. 'Latency', 'RDS', 'Glacier')..." 
                class="w-full p-5 pl-14 rounded-2xl border-2 border-slate-200 shadow-sm focus:border-blue-500 focus:outline-none bg-white text-lg transition-all">
            <svg class="w-6 h-6 absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </div>

        <div id="questionsContainer" class="space-y-6">
            </div>
    </main>

<script>
    // DATA INJECTED DIRECTLY (Part 1: 50 Questions)
    const awsData = [
        {
            tag: "Storage",
            prompt: "Scenario: A company collects 500GB daily across global sites. We need to aggregate this into one S3 bucket fast. How do you minimize operational complexity?",
            answer: "Enable S3 Transfer Acceleration on the destination bucket and use Multipart Uploads.",
            keywords: ["Edge Locations", "AWS Global Backbone", "Parallel Streams", "Speed vs Complexity"]
        },
        {
            tag: "Database",
            prompt: "Question: We have JSON logs in S3. I need to run standard SQL queries on them on-demand with minimal overhead. What's your move?",
            answer: "Amazon Athena.",
            keywords: ["Serverless", "SQL on S3", "Schema-on-read", "No ETL required"]
        },
        {
            tag: "Security",
            prompt: "Challenge: How can we restrict S3 bucket access to only accounts within our AWS Organization without manually managing lists of account IDs?",
            answer: "Use the 'aws:PrincipalOrgID' global condition key in the bucket policy.",
            keywords: ["Resource-based Policy", "AWS Organizations", "Condition Key", "Automation"]
        },
        {
            tag: "Network",
            prompt: "Architecture Problem: An EC2 instance in a private subnet needs to access S3 without any internet connectivity. How do you design this?",
            answer: "Create a Gateway VPC Endpoint for S3.",
            keywords: ["Private Route", "Routing Table update", "No Internet Gateway", "No NAT Gateway"]
        },
        {
            tag: "Compute",
            prompt: "Modernization: A primary server coordinates jobs across multiple nodes. How do we modernize this for maximum resiliency and horizontal scaling?",
            answer: "Use an SQS Queue as a destination for jobs and configure EC2 Auto Scaling based on the queue size.",
            keywords: ["Decoupling", "Queue Depth Scaling", "Worker Nodes", "Horizontal Scaling"]
        },
        {
            tag: "Storage",
            prompt: "Storage Optimization: An SMB file server is running out of space. We need low-latency access to new files and automated archiving for old ones. Solution?",
            answer: "Amazon S3 File Gateway with an S3 Lifecycle policy to transition to Glacier Deep Archive after 7 days.",
            keywords: ["Hybrid Storage", "Local Cache", "Lifecycle Policy", "Cost vs Latency"]
        }
        // ... (I will help you add the other 600+ in batches so you can paste them here)
    ];

    function renderCards(data) {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = data.map(item => `
            <div class="question-card bg-white rounded-3xl border border-slate-200 shadow-sm p-8 card-enter transition-all hover:border-blue-300">
                <div class="flex justify-between items-start mb-6">
                    <span class="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-black uppercase rounded-full tracking-wider">${item.tag}</span>
                </div>
                <h3 class="text-xl font-bold text-slate-800 mb-8 leading-relaxed italic text-blue-900 underline decoration-blue-100 decoration-4">
                    "${item.prompt}"
                </h3>
                
                <button onclick="toggleAnswer(this)" class="group flex items-center gap-2 text-xs font-black text-slate-400 uppercase tracking-widest hover:text-blue-600 transition-colors">
                    <span>Show Evaluator Checklist</span>
                    <svg class="w-4 h-4 transition-transform group-hover:translate-y-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>

                <div class="details-hidden mt-8 p-6 bg-slate-50 rounded-2xl border-t-4 border-blue-500">
                    <div class="mb-6">
                        <div class="text-[10px] font-black text-emerald-600 uppercase tracking-widest mb-2 font-black">Ideal Technical Solution:</div>
                        <div class="text-lg font-bold text-slate-800">${item.answer}</div>
                    </div>
                    <div>
                        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Listen for these keywords:</div>
                        <div class="flex flex-wrap gap-2">
                            ${item.keywords.map(k => `<span class="bg-white border border-slate-200 text-slate-700 text-[10px] px-3 py-1.5 rounded-lg font-bold shadow-sm italic"># ${k}</span>`).join('')}
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleAnswer(btn) {
        const div = btn.nextElementSibling;
        const isHidden = div.classList.contains('details-hidden');
        div.classList.toggle('details-hidden');
        btn.querySelector('span').innerText = isHidden ? "Hide Checklist" : "Show Evaluator Checklist";
    }

    function filterTag(tag) {
        document.querySelectorAll('#tagList button').forEach(b => b.classList.remove('active-tag'));
        event.currentTarget.classList.add('active-tag');
        if (tag === 'all') {
            renderCards(awsData);
        } else {
            const filtered = awsData.filter(d => d.tag === tag);
            renderCards(filtered);
        }
    }

    function searchContent() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = awsData.filter(d => 
            d.prompt.toLowerCase().includes(term) || 
            d.answer.toLowerCase().includes(term) ||
            d.tag.toLowerCase().includes(term)
        );
        renderCards(filtered);
    }

    // Initialize
    renderCards(awsData);
</script>
</body>
</html>
